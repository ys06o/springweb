<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
</head>
<body>
<div class="p-5 mb-5 text-center</> bg-light">
    <h1 class="mb-3">MY Blog</h1>
    <h4 class="mb-3">블로그에 오신 것을 환영합니다.</h4>
</div>

<div class="container mt-5">
    <div class="row">
        <div class="col-lg-8">
            <article>
                <input type="hidden" name="" id="article-id" th:value="${article.id}">

                <header class="mb-4">
                    <input type="text" name="" class="form-control" placeholder="제목" id="title" th:value="${article.content}">
                </header>
            </article>
            <section class="mb-5">
                <textarea class="form-control h-25" rows="10" placeholder="내용" id="content" th:text="${article.content}">
                </textarea>
            </section>
            <button th:if="${article.id} !=null" type="button" id="modify-btn" class="btn btn-primary btn-sm"></button>
            <button th:if="${article.id} ==null" type="button" id="create-btn" class="btn btn-primary btn-sm"></button>
        </div>
    </div>
</div>
<script src="/article.js"></script>
</body>
</html>
